<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" width="1200" height="560" role="img" aria-label="Illustration of the two ResetWell Plus founders in a warm, candid discussion at a whiteboard">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FCFAFF"/>
      <stop offset="0.55" stop-color="#F3E9FB"/>
      <stop offset="1" stop-color="#EADCF8"/>
    </linearGradient>
    <radialGradient id="warm" cx="0.2" cy="0.15" r="0.9">
      <stop offset="0" stop-color="#FBEFE0" stop-opacity="0.95"/>
      <stop offset="0.45" stop-color="#F6E6DC" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#F6E6DC" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="board" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FBF7FF"/>
    </linearGradient>
    <linearGradient id="figA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7E22CE"/>
      <stop offset="1" stop-color="#6D28D9"/>
    </linearGradient>
    <linearGradient id="figB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9333EA"/>
      <stop offset="1" stop-color="#7C5BBE"/>
    </linearGradient>
  </defs>

  <!-- backdrop -->
  <rect width="1200" height="560" fill="url(#bg)"/>
  <rect width="1200" height="560" fill="url(#warm)"/>

  <!-- soft ambient blobs -->
  <circle cx="1050" cy="120" r="150" fill="#C4B5FD" opacity="0.18"/>
  <circle cx="150" cy="470" r="120" fill="#EBD9FB" opacity="0.5"/>

  <!-- window with warm light, upper left -->
  <g>
    <rect x="86" y="70" width="250" height="210" rx="18" fill="#FFFFFF" opacity="0.55"/>
    <rect x="86" y="70" width="250" height="210" rx="18" fill="url(#warm)"/>
    <rect x="86" y="70" width="250" height="210" rx="18" fill="none" stroke="#E3D3F5" stroke-width="4"/>
    <line x1="211" y1="70" x2="211" y2="280" stroke="#E3D3F5" stroke-width="4"/>
    <line x1="86" y1="175" x2="336" y2="175" stroke="#E3D3F5" stroke-width="4"/>
    <!-- warm light rays -->
    <g opacity="0.25" fill="#F4E3CB">
      <polygon points="336,150 620,120 620,220 336,200"/>
      <polygon points="336,210 600,250 600,320 336,260"/>
    </g>
  </g>

  <!-- whiteboard, right -->
  <g>
    <rect x="612" y="96" width="470" height="300" rx="16" fill="url(#board)" stroke="#E7D9F7" stroke-width="4"/>
    <!-- tray -->
    <rect x="646" y="396" width="402" height="12" rx="6" fill="#E7D9F7"/>
    <!-- diagram marks -->
    <circle cx="720" cy="180" r="34" fill="none" stroke="#9333EA" stroke-width="7"/>
    <path d="M778 180 H872" stroke="#6D28D9" stroke-width="7" stroke-linecap="round"/>
    <path d="M858 166 L878 180 L858 194" fill="none" stroke="#6D28D9" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="906" y="150" width="60" height="60" rx="10" fill="#EBD9FB"/>
    <path d="M912 182 l14 14 l24 -30" fill="none" stroke="#7C5BBE" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- little bar chart -->
    <g>
      <rect x="700" y="300" width="26" height="52" rx="6" fill="#C4B5FD"/>
      <rect x="738" y="278" width="26" height="74" rx="6" fill="#9333EA"/>
      <rect x="776" y="252" width="26" height="100" rx="6" fill="#6D28D9"/>
    </g>
    <!-- upward wavy line -->
    <path d="M846 342 C888 322 902 300 940 286 C968 276 992 268 1030 250" fill="none" stroke="#C4B5FD" stroke-width="7" stroke-linecap="round"/>
    <circle cx="1030" cy="250" r="8" fill="#7C5BBE"/>
  </g>

  <!-- floor grounding shadow -->
  <ellipse cx="470" cy="548" rx="360" ry="26" fill="#7C5BBE" opacity="0.12"/>

  <!-- plant, foreground right -->
  <g>
    <path d="M1096 470 h64 l-9 78 h-46 z" fill="#7C5BBE"/>
    <path d="M1128 470 C1120 424 1140 402 1168 396 C1156 424 1152 452 1128 470 Z" fill="#9333EA" opacity="0.85"/>
    <path d="M1128 470 C1132 420 1112 396 1086 392 C1100 420 1104 448 1128 470 Z" fill="#7C5BBE" opacity="0.9"/>
    <path d="M1128 470 C1128 432 1128 408 1128 392" stroke="#4C1D95" stroke-width="3" fill="none" opacity="0.4"/>
  </g>

  <!-- founders, seen from behind, facing the board -->
  <!-- Figure A (left, low bun) -->
  <g>
    <path d="M300 560 C300 470 330 432 388 432 C446 432 476 470 476 560 Z" fill="url(#figA)"/>
    <!-- warm rim light on window side -->
    <path d="M300 560 C300 470 330 432 388 432 C400 432 410 434 419 438 C372 452 356 500 356 560 Z" fill="#FBEFE0" opacity="0.10"/>
    <circle cx="388" cy="408" r="34" fill="url(#figA)"/>
    <circle cx="388" cy="372" r="17" fill="#6D28D9"/>
  </g>

  <!-- Figure B (right, taller, gesturing at the board) -->
  <g>
    <path d="M470 560 C474 458 508 418 568 418 C628 418 662 458 666 560 Z" fill="url(#figB)"/>
    <path d="M470 560 C474 458 508 418 568 418 C580 418 592 421 602 426 C548 444 530 500 530 560 Z" fill="#FBEFE0" opacity="0.10"/>
    <circle cx="568" cy="392" r="36" fill="url(#figB)"/>
    <!-- shoulder-length hair -->
    <path d="M532 392 C530 430 540 460 552 474 L544 430 Z" fill="#7C5BBE"/>
    <path d="M604 392 C606 430 596 460 584 474 L592 430 Z" fill="#7C5BBE"/>
    <!-- raised arm toward the board -->
    <path d="M642 500 C690 470 716 442 742 408" fill="none" stroke="url(#figB)" stroke-width="26" stroke-linecap="round"/>
    <circle cx="748" cy="402" r="15" fill="#9333EA"/>
  </g>
</svg>
